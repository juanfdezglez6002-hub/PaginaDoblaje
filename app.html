<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio - DubberWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="studio-body">
    <header class="studio-header">
        <div class="logo">🎙️ DubberWeb Studio</div>
        <div class="top-tools">
            <input type="file" id="videoInput" accept="video/*" class="file-input">
            <button id="exportBtn" class="btn-primary">💾 Exportar Proyecto</button>
        </div>
    </header>

    <main class="workspace">
        <section class="video-panel">
            <video id="mainVideo" controls></video>
        </section>

        <section class="timeline-panel">
            <div class="toolbar">
                <div class="recording-tools">
                    <button id="recordBtn" class="btn-record">🔴 Grabar (R)</button>
                    <button id="stopBtn" class="btn-stop" disabled>⏹️ Parar</button>
                </div>
                <div class="editing-tools">
                    <button id="splitBtn" class="btn-tool">✂️ Cortar clip (S)</button>
                    <button id="delBtn" class="btn-tool">🗑️ Borrar (Supr)</button>
                    <input type="range" id="zoomSlider" min="1" max="10" value="1" title="Zoom del Timeline">
                </div>
            </div>

            <div id="tracks-area">
                <div class="track-lane">
                    <div class="track-controls">
                        <span class="track-name">Voz Principal</span>
                        <div class="track-buttons">
                            <button class="btn-mute" title="Silenciar">M</button>
                            <button class="btn-solo" title="Solo">S</button>
                        </div>
                        <input type="range" class="vol-slider" min="0" max="100" value="80">
                    </div>
                    <div class="track-content">
                        </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
